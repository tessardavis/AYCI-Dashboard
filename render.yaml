# Render Blueprint — describes how to deploy this repo on Render.
# Docs: https://render.com/docs/blueprint-spec
#
# To deploy: go to Render Dashboard → New → Blueprint, then connect this repo.
# Render reads this file and creates the services automatically.
services:
  - type: web
    name: ayci-dashboard-backend
    runtime: python
    rootDir: backend
    plan: starter             # always-warm; free tier cold-starts hurt UX

    region: frankfurt          # closest to UK; switch to oregon for US
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    autoDeploy: true           # redeploy on every push to main

    # Persistent disk for the private-tier video cache. Survives deploys +
    # idle restarts — without it Render's /tmp gets wiped on every push and
    # we re-transcode every active row from scratch on boot, leaving coaches
    # staring at "Video is still being prepared". 10 GB ≈ 250 transcoded
    # videos at ~35 MB each.
    # Cost: ~$0.25/GB/month → $2.50/mo for 10GB.
    # Resizing later: edit sizeGB here and re-sync the Blueprint in Render.
    disk:
      name: private-video-cache
      mountPath: /var/data
      sizeGB: 10

    envVars:
      # Pinned values — version locked, not secrets.
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: SYNC_TIMEZONE
        value: Europe/London
      - key: STRIPE_UPGRADE_MIN_GBP
        value: "90"
      - key: CIRCLE_BOT_DISABLED
        value: "true"
      - key: GOOGLE_SERVICE_ACCOUNT_FILE
        value: /etc/secrets/google_service_account.json
      # Private-tier video cache → persistent disk above. 9 GB cap leaves
      # 1 GB headroom on the 10 GB disk for filesystem overhead + transient
      # transcode artefacts.
      - key: PRIVATE_VIDEO_CACHE_DIR
        value: /var/data/private_video_cache
      - key: PRIVATE_VIDEO_CACHE_MAX_BYTES
        value: "9663676416"

      # Secrets — left blank here so Render prompts you to fill them in the
      # dashboard. Don't ever put real secret values in this file (it's
      # tracked in Git).
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: GMAIL_OAUTH_REDIRECT_URI
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_DRIVE_PRIVATE_TIER_FOLDER_ID
        sync: false
      - key: MONDAY_API_TOKEN
        sync: false
      - key: CIRCLE_API_TOKEN
        sync: false
      - key: CIRCLE_HEADLESS_TOKEN
        sync: false
      - key: CALENDLY_TOKEN
        sync: false
      - key: CONVERTKIT_API_KEY
        sync: false
      - key: CONVERTKIT_API_SECRET
        sync: false
      - key: CONVERTKIT_WAITLIST_TAG
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: TALLY_API_KEY
        sync: false
      - key: TRANSISTOR_API_KEY
        sync: false
      - key: WATI_BASE_URL
        sync: false
      - key: WATI_ACCESS_TOKEN
        sync: false
      - key: WATI_PHONE_NUMBER
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: YOUTUBE_CHANNEL_HANDLE
        sync: false
      - key: EMERGENT_LLM_KEY
        sync: false
